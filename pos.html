            ],
            "BYD": [

        // --- ข้อมูลจำลอง สินค้า/บริการ ---
        // ปรับปรุง: ล้างรถจะเช็คราคาจาก size ของรถแทน
        const menuItems = [
            {

            { id: 'c2', name: 'อบโอโซน', price: 200, isSizeDependent: false, icon: 'ph-wind', color: 'bg-teal-50 text-teal-600 border-teal-200' },
            { id: 'd1', name: 'ซักเบาะ/พรม', price: 600, isSizeDependent: false, icon: 'ph-armchair', color: 'bg-orange-50 text-orange-600 border-orange-200' },
            { id: 'd2', name: 'ล้างห้องเครื่อง', price: 400, isSizeDependent: false, icon: 'ph-engine', color: 'bg-orange-50 text-orange-600 border-orange-200' }
        ];

        // --- State ของระบบ ---
        let cart = [];
        let settings = { promptPayId: '', name: '' };
        let salesHistory = [];
        let currentCarSize = ''; // เก็บไซส์รถที่กำลังเลือกล่าสุด
<!-- ... existing code ... -->
        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = menuItems.map(item => {
                // ถ้าเมนูขึ้นอยู่กับขนาดรถ ให้แสดงราคาเริ่มต้น หรือคำว่า "ราคาตามไซส์รถ"
                const priceDisplay = item.isSizeDependent ? '฿150 - ฿250' : `฿${item.price}`;
                return `
                <div onclick="addToCart('${item.id}')" class="cursor-pointer border-2 ${item.color.replace('text', 'border').split(' ')[2] || 'border-transparent'} bg-white hover:border-blue-400 p-4 rounded-2xl shadow-sm transition-all transform active:scale-95 flex flex-col items-center text-center">
                    <div class="w-14 h-14 rounded-full ${item.color} flex items-center justify-center mb-3">
                        <i class="ph ${item.icon} text-3xl"></i>
                    </div>
                    <h3 class="font-medium text-sm text-gray-700 leading-tight mb-2">${item.name}</h3>
                    <p class="font-bold text-blue-600 mt-auto text-xs sm:text-sm">${priceDisplay}</p>
                </div>
                `;
            }).join('');
        }

        // --- ระบบตะกร้าสินค้า ---
        function addToCart(itemId) {
            const itemTemplate = menuItems.find(i => i.id === itemId);
            if (!itemTemplate) return;

            let finalPrice = itemTemplate.price;
            let displayName = itemTemplate.name;

            // ถ้ารายการนี้ต้องคิดราคาตามไซส์รถ
            if (itemTemplate.isSizeDependent) {
                if (!currentCarSize) {
                    alert('กรุณาเลือกยี่ห้อและรุ่นรถก่อน เพื่อคำนวณราคาล้างรถให้ถูกต้องครับ');
                    document.getElementById('car-brand').focus();
                    return;
                }
                finalPrice = itemTemplate.prices[currentCarSize];
                displayName = `${itemTemplate.name} (Size ${currentCarSize})`;
            }

            // เช็คว่ามีรายการชื่อเดียวกันในตะกร้าหรือยัง
            const existingItemIndex = cart.findIndex(i => i.name === displayName);
            if (existingItemIndex !== -1) {
                cart[existingItemIndex].qty += 1;
            } else {
                // สร้าง object ใหม่ใส่ตะกร้า ป้องกันการอ้างอิงข้อมูลผิด
                cart.push({ 
                    id: itemId, 
                    name: displayName, 
                    price: finalPrice, 
                    qty: 1 
                });
            }
            renderCart();
        }
<!-- ... existing code ... -->
        function clearCart() {
            cart = [];
            currentCarSize = ''; // เคลียร์ไซส์
            
            // ล้างข้อมูลรถด้วย
            document.getElementById('car-plate').value = '';
            document.getElementById('car-brand').value = '';
            
            // รีเซ็ต Dropdown รุ่นรถ
            const modelSelect = document.getElementById('car-model');
            modelSelect.innerHTML = '<option value="">-- เลือกรุ่น --</option>';
            modelSelect.disabled = true;

            // ซ่อน Badge
            document.getElementById('car-size-badge').classList.add('hidden');
            
            renderCart();
        }
<!-- ... existing code ... -->
        // --- ระบบควบคุม Dropdown รถยนต์ ---
        function initCarDropdowns() {
            const brandSelect = document.getElementById('car-brand');
            Object.keys(carData).forEach(brand => {
                const option = document.createElement('option');
                option.value = brand;
                option.textContent = brand;
                brandSelect.appendChild(option);
            });
        }

        function updateCarModels() {
            const brandSelect = document.getElementById('car-brand');
            const modelSelect = document.getElementById('car-model');
            const badge = document.getElementById('car-size-badge');
            const selectedBrand = brandSelect.value;

            // เคลียร์รุ่นเก่าและไซส์เก่า
            modelSelect.innerHTML = '<option value="">-- เลือกรุ่น --</option>';
            currentCarSize = '';
            badge.classList.add('hidden');

            if (selectedBrand && carData[selectedBrand]) {
                modelSelect.disabled = false;
                carData[selectedBrand].forEach(car => {
                    const option = document.createElement('option');
                    option.value = car.name;
                    option.textContent = car.name;
                    // แอบเก็บค่าไซส์ไว้ใน attribute ของ option เผื่อใช้ตอน onchange
                    option.setAttribute('data-size', car.size);
                    modelSelect.appendChild(option);
                });
            } else {
                modelSelect.disabled = true;
            }
        }

        // ฟังก์ชันใหม่: อัปเดตไซส์เมื่อเลือกรุ่นรถ
        function updateCarSize() {
            const modelSelect = document.getElementById('car-model');
            const selectedOption = modelSelect.options[modelSelect.selectedIndex];
            const badge = document.getElementById('car-size-badge');
            
            if (selectedOption.value !== "") {
                currentCarSize = selectedOption.getAttribute('data-size');
                
                // แสดงป้ายบอกไซส์รถ
                badge.textContent = `Size ${currentCarSize}`;
                badge.classList.remove('hidden');

                // เปลี่ยนสี Badge ตามไซส์
                let badgeColor = 'bg-gray-100 text-gray-700';
                if(currentCarSize === 'S') badgeColor = 'bg-green-100 text-green-700';
                if(currentCarSize === 'M') badgeColor = 'bg-blue-100 text-blue-700';
                if(currentCarSize === 'L') badgeColor = 'bg-purple-100 text-purple-700';
                if(currentCarSize === 'XL') badgeColor = 'bg-orange-100 text-orange-700';
                
                badge.className = `text-[10px] font-bold px-2 py-0.5 rounded-full ${badgeColor}`;
            } else {
                currentCarSize = '';
                badge.classList.add('hidden');
            }
        }
    </script>
